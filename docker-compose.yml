version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mailmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --loglevel=warning
    volumes:
      - .:/app
      - ./token.json:/app/token.json
      - ./credentials.json:/app/credentials.json
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/mailmind
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_MODEL_NAME=gpt-4o-mini
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A workers.celery_app beat --loglevel=warning
    volumes:
      - .:/app
      - ./token.json:/app/token.json
      - ./credentials.json:/app/credentials.json
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/mailmind
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_MODEL_NAME=gpt-4o-mini
    env_file:
      - .env
    depends_on:
      - db
      - redis



volumes:
  postgres_data:
